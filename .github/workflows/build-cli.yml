name: Build CLI

on:
  push:
    branches: ["master"]
    tags: ["v*"]
  pull_request:
    branches: ["master"]

env:
  CARGO_TERM_COLOR: always
  CARGO_PROFILE_RELEASE_OPT_LEVEL: 3
  CARGO_PROFILE_RELEASE_LTO: true
  CARGO_PROFILE_RELEASE_CODEGEN_UNITS: 1
  CARGO_PROFILE_RELEASE_PANIC: abort
  CARGO_PROFILE_RELEASE_STRIP: true

jobs:
  build-cli:
    name: CLI ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            artifact: upc-x86_64-linux-musl
            os: ubuntu-latest
            features: cli,host,device
            use_cross: true
          - target: aarch64-unknown-linux-musl
            artifact: upc-aarch64-linux-musl
            os: ubuntu-latest
            features: cli,host,device
            use_cross: true
          - target: armv7-unknown-linux-musleabihf
            artifact: upc-armv7-linux-musleabihf
            os: ubuntu-latest
            features: cli,host,device
            use_cross: true
          - target: x86_64-pc-windows-msvc
            artifact: upc-x86_64-windows.exe
            os: windows-latest
            features: cli,host
            use_cross: false
            ext: .exe
          - target: aarch64-apple-darwin
            artifact: upc-aarch64-macos
            os: macos-latest
            features: cli,host
            use_cross: false

    steps:
      - uses: actions/checkout@v6

      - name: Update Rust
        run: rustup update

      - name: Add Rust target
        if: ${{ !matrix.use_cross }}
        run: rustup target add ${{ matrix.target }}

      - name: Install cross
        if: ${{ matrix.use_cross }}
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build CLI binary
        run: ${{ matrix.use_cross && 'cross' || 'cargo' }} build --release --features ${{ matrix.features }} --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: cp target/${{ matrix.target }}/release/upc${{ matrix.ext }} ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Attach binaries to release
    needs: build-cli
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8

      - name: Attach binaries to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            upc-x86_64-linux-musl/upc-x86_64-linux-musl
            upc-aarch64-linux-musl/upc-aarch64-linux-musl
            upc-armv7-linux-musleabihf/upc-armv7-linux-musleabihf
            upc-x86_64-windows.exe/upc-x86_64-windows.exe
            upc-aarch64-macos/upc-aarch64-macos
